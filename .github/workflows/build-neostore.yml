name: Build Neo Store Optimized APK

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Configuration de Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Accorder les permissions à Gradle
        run: chmod +x gradlew

      - name: Compilation avec Gradle
        run: ./gradlew assembleRelease --no-daemon

      # ÉTAPE CORRIGÉE : Utilisation d'une action dédiée qui sait où trouver apksigner
      - name: Signature automatique de l'APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: build/outputs/apk/release
          signingKeyBase64: "" # Laisser vide force l'utilisation d'une clé de debug valide
          alias: androiddebugkey
          keyStorePassword: android
          keyPassword: android

      - name: Diagnostic Système et Fichiers
        if: always()
        run: |
          echo "=== RAM RESTANTE ==="
          free -m
          echo "=== FICHIERS APK TROUVÉS ==="
          find . -name "*.apk" -type f -exec ls -lh {} +

      # L'action de signature crée un fichier qui se termine par -signed.apk
      - name: Téléverser l'APK léger et signé
        uses: actions/upload-artifact@v4
        with:
          name: NeoStore-Lightweight-Signed-APK
          path: 'build/outputs/apk/release/*-signed.apk'
          if-no-files-found: error
