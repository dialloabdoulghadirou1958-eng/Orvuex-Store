name: Build Neo Store Optimized APK

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Configuration de Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Accorder les permissions à Gradle
        run: chmod +x gradlew

      # ICI LE CHANGEMENT : On demande uniquement la variante "release" standard 
      # On cible l'APK classique sans les dépendances d'autres saveurs (flavors)
      - name: Compilation ciblée avec Gradle
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Diagnostic Système et Fichiers
        if: always()
        run: |
          echo "=== RAM RESTANTE ==="
          free -m
          echo "=== APKS GÉNÉRÉS ==="
          find . -name "*.apk" -type f -exec ls -lh {} +

      - name: Téléverser l'APK léger
        uses: actions/upload-artifact@v4
        with:
          name: NeoStore-Lightweight-APK
          path: 'app/build/outputs/apk/release/*.apk' # On cible directement le dossier final
          if-no-files-found: error
