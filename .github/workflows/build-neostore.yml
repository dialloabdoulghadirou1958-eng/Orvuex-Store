name: Build Neo Store Optimized APK

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Configuration de Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Accorder les permissions à Gradle
        run: chmod +x gradlew

      - name: Compilation avec Gradle
        run: ./gradlew assembleRelease --no-daemon

      # ÉTAPE AJOUTÉE : Signature automatique sans fournir de clé personnelle
      - name: Signature automatique de l'APK (Debug Key)
        run: |
          echo "=== Génération d'une clé temporaire ==="
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          
          echo "=== Recherche et Signature de l'APK de Release ==="
          APK_PATH=$(find build/outputs/apk/release/ -name "*.apk" -type f | head -n 1)
          if [ -n "$APK_PATH" ]; then
            apksigner sign --ks debug.keystore --ks-pass pass:android --key-pass pass:android --out build/outputs/apk/release/Neo_Store_Signed.apk "$APK_PATH"
            echo "L'APK a été signé avec succès !"
          else
            echo "Erreur : APK introuvable pour la signature."
            exit 1
          fi

      - name: Diagnostic Système et Fichiers
        if: always()
        run: |
          echo "=== RAM RESTANTE ==="
          free -m
          echo "=== FICHIERS APK TROUVÉS ==="
          find . -name "*.apk" -type f -exec ls -lh {} +

      # On téléverse uniquement l'APK qui contient le mot "Signed"
      - name: Téléverser l'APK léger et signé
        uses: actions/upload-artifact@v4
        with:
          name: NeoStore-Lightweight-Signed-APK
          path: 'build/outputs/apk/release/*Signed.apk'
          if-no-files-found: error
