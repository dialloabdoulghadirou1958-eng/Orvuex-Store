name: Build Neo Store Optimized APK

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch: # Permet de lancer le build manuellement depuis l'onglet Actions

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Récupération du code source de Neo Store
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      # 2. Configuration de l'environnement Java
      - name: Configuration de Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle' # Active le cache pour accélérer les futurs builds

      # 3. Autoriser l'exécution de Gradle
      - name: Accorder les permissions à Gradle
        run: chmod +x gradlew

      # 4. Compilation globale de la variante Release (Correction de la tâche)
      - name: Compilation avec Gradle
        run: ./gradlew assembleRelease --no-daemon

      # 5. Ton bloc de diagnostic pour surveiller la RAM et le disque de la machine
      - name: Diagnostic Système et Fichiers
        if: always() # S'exécute même si le build échoue pour te donner les métriques
        run: |
          echo "=== RAM RESTANTE ==="
          free -m
          echo "=== ESPACE DISQUE RESTANT ==="
          df -h /
          echo "=== FICHIERS APK TROUVÉS ==="
          find . -name "*.apk" -type f -exec ls -lh {} +

      # 6. Extraction de l'APK de production uniquement
      - name: Téléverser l'APK léger
        uses: actions/upload-artifact@v4
        with:
          name: NeoStore-Lightweight-APK
          path: '**/build/outputs/apk/release/*.apk' # Filtre pour ne prendre que la version finale épurée
          if-no-files-found: error
